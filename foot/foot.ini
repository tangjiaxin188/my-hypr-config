# ======================================================
#  Foot 终端配置文件 (v1.26.0+ 语法)
#  风格：Cyberpunk (适配 cyber-hyprland-theme)
#  效果：无边框 + 霓虹紫/粉毛玻璃背景
# ======================================================

# ---------- 基本设置 ----------
[main]
# 赛博朋克推荐字体 (请确保已安装)
font=JetBrainsMono Nerd Font:size=12
# 内边距
pad=10x10

# ---------- 无边框设置 ----------
[csd]
border-width=0
preferred=none

# ---------- 深色主题 (赛博朋克配色) ----------
[colors-dark]
# 深邃紫黑色背景
background=0a0a1a
# 霓虹蓝绿色文字
foreground=00ffcc

# 16 色调色板 (霓虹风格)
regular0=0a0a1a      # 黑
regular1=ff0077      # 红 -> 霓虹粉
regular2=00ff66      # 绿 -> 霓虹绿
regular3=ffaa00      # 黄 -> 霓虹橙
regular4=00d4ff      # 蓝 -> 霓虹蓝
regular5=bf00ff      # 品红 -> 霓虹紫
regular6=00ffcc      # 青 -> 亮青
regular7=e0e0e0      # 白

bright0=444466       # 亮黑
bright1=ff66aa       # 亮红 -> 亮粉
bright2=66ff99       # 亮绿
bright3=ffcc66       # 亮黄 -> 亮橙
bright4=66ddff       # 亮蓝
bright5=dd77ff       # 亮品红 -> 亮紫
bright6=66ffdd       # 亮青
bright7=ffffff       # 亮白

# ---------- 毛玻璃 (透明 + 模糊) ----------
# 背景透明度 (0.0~1.0)
alpha=0.85
# 实验性背景模糊 (需要合成器支持 ext-background-effect-v1)
# 若合成器不支持，请改用合成器自身的模糊规则 (如 Hyprland 的 windowrule)
blur=yes

# ---------- 快捷键切换深/浅主题 ----------
[key-bindings]
# Super+C 切换到深色主题 (当前配置)
color-theme-switch-dark=Mod4+c
# Super+V 切换到浅色主题 (若存在 [colors-light])
color-theme-switch-light=Mod4+v
